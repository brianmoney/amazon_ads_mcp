services:
  amazon-ads-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: amazon-ads-mcp:latest
    container_name: amazon-ads-mcp
    env_file:
      - .env
    environment:
      # Server runtime
      - TRANSPORT=http
      - HOST=0.0.0.0
      - PORT=${PORT:-9080}
      - LOG_LEVEL=INFO
      # AMAZON_AD_API_PACKAGES is set in .env (env_file values are overridden by
      # explicit environment entries, so we keep it in .env only)
      # Token persistence (disabled by default for security)
      # Set to 'true' to cache refresh tokens across restarts (see docs for security implications)
      - AMAZON_ADS_TOKEN_PERSIST=false
      - AMAZON_ADS_CACHE_DIR=/app/.cache/amazon-ads-mcp
      # Canonical auth selection for Docker testing.
      # Override AUTH_METHOD=openbridge when intentionally exercising that path.
      - AUTH_METHOD=${AUTH_METHOD:-direct}
      # Background tasks (enabled by default - allows long-running tools to run in background)
      # ENABLE_TASKS=false
      # Runtime OpenAPI slimming (on by default - set to 'false' to disable)
      # SLIM_OPENAPI_STRIP_RESPONSES=false  # Keep response schemas in tool definitions
      # SLIM_OPENAPI_AGGRESSIVE=false       # Disable enum truncation, schema flattening, etc.
      # Progressive tool disclosure: hide API tools by default, reveal on demand
      # Off by default - Claude Desktop doesn't re-fetch tools/list mid-conversation
      # Enable for MCP clients that support tools/list_changed notifications
      # PROGRESSIVE_TOOL_DISCLOSURE=true

    ports:
      - "${PORT:-9080}:${PORT:-9080}"
    volumes:
      # Persist downloaded exports/reports
      - downloads:/app/data
      # Persist token cache across container restarts
      - cache:/app/.cache
    command: [
      "python", "-m", "amazon_ads_mcp.server",
      "--transport", "${TRANSPORT:-http}",
      "--host", "${HOST:-0.0.0.0}",
      "--port", "${PORT:-9080}"
    ]

  postgres:
    image: postgres:16
    profiles: ["warehouse"]
    container_name: amazon-ads-postgres
    environment:
      - POSTGRES_DB=${WAREHOUSE_POSTGRES_DB:-amazon_ads}
      - POSTGRES_USER=${WAREHOUSE_POSTGRES_USER:-amazon_ads}
      - POSTGRES_PASSWORD=${WAREHOUSE_POSTGRES_PASSWORD:-amazon_ads}
    ports:
      - "${WAREHOUSE_POSTGRES_PORT:-5432}:5432"
    volumes:
      - warehouse_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${WAREHOUSE_POSTGRES_USER:-amazon_ads} -d ${WAREHOUSE_POSTGRES_DB:-amazon_ads}"]
      interval: 10s
      timeout: 5s
      retries: 5

  warehouse-worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: amazon-ads-mcp:latest
    profiles: ["warehouse"]
    container_name: amazon-ads-mcp-warehouse
    env_file:
      - .env
    environment:
      - AUTH_METHOD=${AUTH_METHOD:-direct}
      - LOG_LEVEL=INFO
      - AMAZON_ADS_TOKEN_PERSIST=${AMAZON_ADS_TOKEN_PERSIST:-false}
      - AMAZON_ADS_CACHE_DIR=/app/.cache/amazon-ads-mcp
      - WAREHOUSE_WORKER_ENABLED=true
      - WAREHOUSE_DATABASE_DSN=postgresql+psycopg://${WAREHOUSE_POSTGRES_USER:-amazon_ads}:${WAREHOUSE_POSTGRES_PASSWORD:-amazon_ads}@postgres:5432/${WAREHOUSE_POSTGRES_DB:-amazon_ads}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - downloads:/app/data
      - cache:/app/.cache
    command: [
      "python", "-m", "amazon_ads_mcp.warehouse.worker_entrypoint"
    ]
  
volumes:
  downloads: {}
  cache: {}
  warehouse_postgres: {}
